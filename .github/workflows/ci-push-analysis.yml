name: "[Etapa 0] Análise de Pushes"

on:
  push:
    branches-ignore:
      - main

jobs:
  analise-de-pushes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar .NET SDK 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restaurar dependências
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Rodar Testes
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Instalar dotnet-coverage tool
        run: dotnet tool install --global dotnet-coverage

      - name: Instalar ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Rodar Testes com Cobertura
        run: |
          dotnet test NotificationService.sln \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --collect:"Code Coverage" \
            --results-directory ./TestResults

      - name: Converter cobertura para Cobertura XML
        run: |
          echo "=== Coverage files generated ==="
          find ./TestResults -name "*.coverage" -type f
          
          echo "=== Merging coverage files to Cobertura XML ==="
          dotnet-coverage merge ./TestResults/**/*.coverage -f cobertura -o coverage.cobertura.xml

      - name: Converter Cobertura para OpenCover
        run: |
          echo "=== Converting Cobertura to OpenCover format ==="
          mkdir -p coverage
          reportgenerator \
            -reports:coverage.cobertura.xml \
            -targetdir:coverage \
            -reporttypes:OpenCover
          
          echo "=== Generated OpenCover file ==="
          ls -lh coverage/coverage.opencover.xml

      - name: Upload cobertura de código
        uses: actions/upload-artifact@v4
        with:
          name: cobertura-code-coverage
          path: |
            **/TestResults/**/*.xml
            coverage/coverage.opencover.xml
          retention-days: 7
