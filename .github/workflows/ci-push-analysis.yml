name: "[Etapa 0] Análise de Pushes"

on:
  push:
    branches-ignore:
      - main

jobs:
  analise-de-pushes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar .NET SDK 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restaurar dependências
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Rodar Testes
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Rodar Testes com Cobertura
        run: |
          dotnet test NotificationService.sln \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --settings coverlet.runsettings

      - name: Copiar arquivo de cobertura
        run: |
          echo "=== Locating coverage files ==="
          find ./TestResults -name "coverage.opencover.xml" -type f
          
          echo "=== Copying coverage file ==="
          mkdir -p coverage
          find ./TestResults -name "coverage.opencover.xml" -exec cp {} coverage/coverage.opencover.xml \;
          
          echo "=== Generated OpenCover file ==="
          ls -lh coverage/coverage.opencover.xml

      - name: Upload cobertura de código
        uses: actions/upload-artifact@v4
        with:
          name: cobertura-code-coverage
          path: |
            **/TestResults/**/*.xml
            coverage/coverage.opencover.xml
          retention-days: 7
