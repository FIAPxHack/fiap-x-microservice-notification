name: "[Etapa 1] Pull Request"

on:
  pull_request:
    branches: [ "main" ]
    types: [opened, synchronize, reopened]

jobs:
  # 1. Build e Testes
  build-and-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar .NET SDK 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restaurar dependências
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Rodar Testes
        run: dotnet test --no-build --configuration Release --verbosity normal

  # 2. Análise SonarQube
  sonarqube-analysis:
    runs-on: ubuntu-latest
    needs: build-and-tests
    steps:
      - name: Fazer checkout do repositório (com histórico completo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar .NET SDK 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Instalar dotnet-coverage tool
        run: dotnet tool install --global dotnet-coverage

      - name: Instalar ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Instalar SonarScanner para .NET
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Executar Análise SonarQube
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          dotnet sonarscanner begin \
            /k:"FIAPxHack_fiap-x-microservice-notification" \
            /o:"fiapxhack" \
            /d:sonar.token="${SONAR_TOKEN}" \
            /d:sonar.host.url="${SONAR_HOST_URL}" \
            /d:sonar.cs.opencover.reportsPaths="coverage/coverage.opencover.xml" \
            /d:sonar.coverage.exclusions="**/tests/**/*"
          
          dotnet build NotificationService.sln --configuration Release
          
          dotnet test NotificationService.sln \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --collect:"Code Coverage" \
            --results-directory ./TestResults
          
          echo "=== Coverage files generated ==="
          find . -name "*.coverage" -type f
          
          echo "=== Merging coverage files to Cobertura XML ==="
          coverage_files=$(find . -name "*.coverage" -type f)
          if [ -n "$coverage_files" ]; then
            dotnet-coverage merge $coverage_files -f cobertura -o coverage.cobertura.xml
          else
            echo "No coverage files found!"
            exit 1
          fi
          
          echo "=== Converting Cobertura to OpenCover format ==="
          mkdir -p coverage
          reportgenerator \
            -reports:coverage.cobertura.xml \
            -targetdir:coverage \
            -reporttypes:OpenCover
          
          echo "=== Generated OpenCover file ==="
          ls -lh coverage/coverage.opencover.xml
          
          dotnet sonarscanner end /d:sonar.token="${SONAR_TOKEN}"
